<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttplug WASM Test</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Courier New', monospace;
        background: #0a0a0a;
        color: #ccc;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
      }
      h1 { font-size: 1.2rem; color: #666; margin-bottom: 1.5rem; letter-spacing: 0.1em; }

      /* THE BUTTON */
      .big-button-wrap {
        position: relative;
        margin: 1rem 0 2rem;
      }
      .big-button {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        font-family: inherit;
        font-size: 1rem;
        font-weight: bold;
        letter-spacing: 0.05em;
        color: #fff;
        text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        background: radial-gradient(circle at 35% 35%, #ff4444, #aa0000 60%, #660000);
        box-shadow:
          0 6px 20px rgba(200, 0, 0, 0.4),
          inset 0 -4px 8px rgba(0,0,0,0.3),
          inset 0 4px 8px rgba(255,100,100,0.2);
        transition: all 0.1s ease;
        position: relative;
        z-index: 1;
      }
      .big-button:hover:not(:disabled) {
        background: radial-gradient(circle at 35% 35%, #ff6666, #cc0000 60%, #880000);
        box-shadow:
          0 6px 30px rgba(255, 0, 0, 0.6),
          inset 0 -4px 8px rgba(0,0,0,0.3),
          inset 0 4px 8px rgba(255,100,100,0.3);
        transform: scale(1.03);
      }
      .big-button:active:not(:disabled) {
        transform: scale(0.97) translateY(2px);
        box-shadow:
          0 2px 10px rgba(200, 0, 0, 0.3),
          inset 0 2px 6px rgba(0,0,0,0.4);
      }
      .big-button:disabled {
        background: radial-gradient(circle at 35% 35%, #555, #333 60%, #222);
        box-shadow:
          0 4px 10px rgba(0,0,0,0.3),
          inset 0 -4px 8px rgba(0,0,0,0.3);
        cursor: not-allowed;
        color: #888;
      }
      .big-button.active {
        background: radial-gradient(circle at 35% 35%, #ff8888, #ee2222 60%, #aa0000);
        animation: pulse 0.6s ease-in-out infinite alternate;
      }
      @keyframes pulse {
        from { box-shadow: 0 6px 20px rgba(255, 0, 0, 0.4); }
        to { box-shadow: 0 6px 40px rgba(255, 0, 0, 0.8), 0 0 60px rgba(255, 0, 0, 0.3); }
      }
      .ring {
        position: absolute;
        inset: -12px;
        border-radius: 50%;
        border: 3px solid #333;
        z-index: 0;
      }

      /* Status & controls */
      .status {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        font-size: 0.85rem;
      }
      .dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: #333;
      }
      .dot.loading { background: #fc4; animation: blink 0.8s infinite; }
      .dot.ok { background: #4f4; }
      .dot.err { background: #f44; }
      @keyframes blink { 50% { opacity: 0.3; } }

      .controls {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      .controls button {
        font-family: inherit;
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
        background: #1a1a1a;
        color: #aaa;
        border: 1px solid #333;
        cursor: pointer;
        border-radius: 3px;
      }
      .controls button:hover:not(:disabled) { background: #252525; color: #fff; border-color: #555; }
      .controls button:disabled { opacity: 0.4; cursor: not-allowed; }

      /* Device list */
      .devices {
        width: 100%;
        max-width: 500px;
      }
      .devices h3 { font-size: 0.8rem; color: #666; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
      .device-card {
        background: #141414;
        border: 1px solid #222;
        border-radius: 4px;
        padding: 0.75rem 1rem;
        margin-bottom: 0.5rem;
      }
      .device-card > div { width: 100%; }
      .device-name { color: #fc4; font-weight: bold; }
      .device-meta { color: #666; font-size: 0.75rem; display: flex; gap: 0.75rem; align-items: center; }
      .device-battery { color: #4f4; }
      .device-battery.low { color: #f44; }
      .device-battery.mid { color: #fc4; }
      .device-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.4rem; }
      .device-tag { font-size: 0.65rem; background: #1a1a1a; border: 1px solid #333; border-radius: 2px; padding: 0.1rem 0.4rem; color: #888; }
      .device-tag.output { border-color: #553300; color: #fc4; }
      .device-tag.input { border-color: #003355; color: #8cf; }
      .device-slider-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
      .device-slider-row label { font-size: 0.7rem; color: #666; min-width: 3rem; }
      .device-slider-row input[type="range"] {
        flex: 1; accent-color: #f44;
        height: 4px; cursor: pointer;
      }
      .device-slider-row .slider-val { font-size: 0.7rem; color: #fc4; min-width: 2.5rem; text-align: right; }
      .no-devices { color: #444; font-style: italic; font-size: 0.85rem; }

      /* Log */
      .log-section {
        width: 100%;
        max-width: 500px;
        margin-top: 1.5rem;
      }
      .log-section h3 { font-size: 0.8rem; color: #666; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
      #log {
        background: #0d0d0d;
        border: 1px solid #1a1a1a;
        padding: 0.75rem;
        max-height: 300px;
        overflow-y: auto;
        font-size: 0.75rem;
        line-height: 1.5;
        border-radius: 4px;
        word-break: break-word;
      }
      #log .ok { color: #4f4; }
      #log .err { color: #f44; }
      #log .info { color: #8cf; }
      #log .device { color: #fc4; }
      #log .dim { color: #555; }

      /* Bluetooth warning */
      .bt-warning {
        display: none;
        width: 100%;
        max-width: 500px;
        background: #1a1000;
        border: 1px solid #fc4;
        border-radius: 4px;
        padding: 1rem;
        margin-bottom: 1.5rem;
        font-size: 0.8rem;
        line-height: 1.6;
        color: #fc4;
      }
      .bt-warning code {
        background: #2a2000;
        padding: 0.15rem 0.4rem;
        border-radius: 2px;
        font-size: 0.75rem;
      }
      .bt-warning strong { color: #fda; }
      .bt-warning u { text-decoration-color: #fc4; }
    </style>
  </head>
  <body>
    <h1>BUTTPLUG WASM TEST</h1>

    <div class="status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Not initialized</span>
    </div>

    <div class="bt-warning" id="bt-warning"></div>

    <div class="controls">
      <button id="btn-init">Init WASM</button>
      <button id="btn-scan" disabled>Scan</button>
    </div>

    <div class="big-button-wrap">
      <div class="ring"></div>
      <button class="big-button" id="btn-go" disabled>GO</button>
    </div>

    <div class="devices">
      <h3>Devices</h3>
      <div id="device-list"><span class="no-devices">No devices connected</span></div>
    </div>

    <div class="log-section">
      <h3>Log</h3>
      <div id="log"></div>
    </div>

    <script src="index.js" type="module"></script>
  </body>
</html>
